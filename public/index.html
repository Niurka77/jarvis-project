<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JARVIS - Centro de Control</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .voice-btn {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 12px 15px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.3em;
      margin-right: 8px;
      transition: all 0.3s;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    .voice-btn:hover { 
      background: #45a049; 
      transform: scale(1.05);
    }
    .voice-btn.listening { 
      background: #f44336; 
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(244, 67, 54, 0.7); }
      70% { box-shadow: 0 0 0 15px rgba(244, 67, 54, 0); }
      100% { box-shadow: 0 0 0 0 rgba(244, 67, 54, 0); }
    }
    .input-area {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .input-area input {
      flex: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🤖 JARVIS</h1>
      <p>Centro de Control - Niurka</p>
      <div id="status" class="status">Conectando...</div>
    </header>

    <div class="chat-container">
      <div id="chat-messages" class="messages"></div>
      
      <div class="input-area">
        <button id="voice-btn" class="voice-btn" onclick="toggleListening()" title="Ctrl+M para hablar">
          🎤
        </button>
        <input type="text" id="message-input" placeholder="Escribe o habla con Jarvis..." />
        <button onclick="enviarMensaje()">Enviar</button>
      </div>
    </div>

    <div class="recordatorios">
      <h3>⏰ Crear Recordatorio</h3>
      <input type="time" id="hora-recordatorio" />
      <input type="text" id="texto-recordatorio" placeholder="¿Qué debo recordarte?" />
      <button onclick="crearRecordatorio()">Programar</button>
    </div>

    <div id="notificaciones" class="notificaciones"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
