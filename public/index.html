<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JARVIS - Centro de Control</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Estilo opcional para el botón de voz */
    .voice-btn {
      background: #2196F3;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.2em;
      margin-left: 8px;
      transition: background 0.2s;
    }
    .voice-btn:hover { background: #1976D2; }
    .voice-btn.listening { background: #f44336; animation: pulse 1.5s infinite; }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(244, 67, 54, 0.7); }
      70% { box-shadow: 0 0 0 10px rgba(244, 67, 54, 0); }
      100% { box-shadow: 0 0 0 0 rgba(244, 67, 54, 0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🤖 JARVIS</h1>
      <p>Centro de Control - Niurka</p>
      <div id="status" class="status">Conectando...</div>
    </header>

    <div class="chat-container">
      <div id="chat-messages" class="messages"></div>
      
      <div class="input-area">
        <button id="voice-btn" class="voice-btn" onclick="toggleListening()" title="Ctrl+M para activar">
          🎤
        </button>
        <input type="text" id="message-input" placeholder="Escribe o habla con Jarvis..." />
        <button onclick="enviarMensaje()">Enviar</button>
      </div>
    </div>

    <div class="recordatorios">
      <h3>⏰ Crear Recordatorio</h3>
      <input type="time" id="hora-recordatorio" />
      <input type="text" id="texto-recordatorio" placeholder="¿Qué debo recordarte?" />
      <button onclick="crearRecordatorio()">Programar</button>
    </div>

    <div id="notificaciones" class="notificaciones"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
