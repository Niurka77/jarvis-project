<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JARVIS - Centro de Control</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .voice-btn {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 12px 15px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.3em;
      margin-right: 8px;
      transition: all 0.3s;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    .voice-btn:hover { 
      background: #45a049; 
      transform: scale(1.05);
    }
    .voice-btn.listening { 
      background: #f44336; 
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(244, 67, 54, 0.7); }
      70% { box-shadow: 0 0 0 15px rgba(244, 67, 54, 0); }
      100% { box-shadow: 0 0 0 0 rgba(244, 67, 54, 0); }
    }
    .input-area {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .input-area input {
      flex: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🤖 JARVIS</h1>
      <p>Centro de Control - Niurka</p>
      <div id="status" class="status">Conectando...</div>
    </header>

    <div class="chat-container">
      <div id="chat-messages" class="messages"></div>
      
      <!-- En el input-area -->
<div class="input-area">
  <button id="voice-btn" class="voice-btn" onclick="toggleListening()" title="Ctrl+M para hablar">
    🎤
  </button>
  <input type="text" id="message-input" placeholder="Escribe o habla con Jarvis..." />
  <button onclick="enviarMensaje()">Enviar</button>
</div>
    </div>

    <div class="recordatorios">
      <h3>⏰ Crear Recordatorio</h3>
      <input type="time" id="hora-recordatorio" />
      <input type="text" id="texto-recordatorio" placeholder="¿Qué debo recordarte?" />
      <button onclick="crearRecordatorio()">Programar</button>
    </div>

    <div id="notificaciones" class="notificaciones"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
  <!-- Overlay de inicio (se quita después del primer clic) -->
<div id="start-overlay" style="
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  color: white;
">
  <h1 style="font-size: 2.5em; margin-bottom: 20px;">🤖 Bienvenida, Niurka</h1>
  <p style="font-size: 1.2em; margin-bottom: 30px; max-width: 600px; text-align: center;">
    Jarvis está listo para ayudarte.<br>
    Haz clic en el botón para activar la voz y comenzar.
  </p>
  <button onclick="iniciarJarvis()" style="
    background: #4CAF50;
    color: white;
    border: none;
    padding: 20px 40px;
    font-size: 1.3em;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
    transition: transform 0.2s;
  " onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
    🎙️ INICIAR JARVIS
  </button>
  <p style="margin-top: 20px; font-size: 0.9em; opacity: 0.7;">
    (Necesario para activar el micrófono y la voz)
  </p>
</div>
</body>
</html>
