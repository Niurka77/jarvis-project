<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JARVIS - Centro de Control</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Fondo animado con burbujas -->
  <div class="aero-background">
    <div class="bubble bubble1"></div>
    <div class="bubble bubble2"></div>
    <div class="bubble bubble3"></div>
    <div class="bubble bubble4"></div>
    <div class="bubble bubble5"></div>
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
  </div>

  <div class="container">
    <header class="aero-header">
      <div class="header-glow"></div>
      <h1>🤖 JARVIS</h1>
      <p class="subtitle">Centro de Control - Niurka</p>
      <div id="status" class="status aero-badge">Conectando...</div>
    </header>

    <div class="chat-container aero-panel">
      <div class="panel-header">
        <span class="panel-icon">💬</span>
        <span>Chat con Jarvis</span>
      </div>
      <div id="chat-messages" class="messages"></div>
      
      <div class="input-area">
        <button id="voice-btn" class="voice-btn aero-button" onclick="toggleListening()" title="Ctrl+M para hablar">
          <span class="btn-icon">🎤</span>
        </button>
        <input type="text" id="message-input" class="aero-input" placeholder="Escribe o habla con Jarvis..." />
        <button onclick="enviarMensaje()" class="send-btn aero-button">
          <span>Enviar</span>
          <span class="btn-arrow">→</span>
        </button>
      </div>
    </div>

    <div class="recordatorios aero-panel">
      <div class="panel-header">
        <span class="panel-icon">⏰</span>
        <span>Crear Recordatorio</span>
      </div>
      <div class="recordatorio-content">
        <input type="time" id="hora-recordatorio" class="aero-input" />
        <input type="text" id="texto-recordatorio" class="aero-input" placeholder="¿Qué debo recordarte?" />
        <button onclick="crearRecordatorio()" class="aero-button primary">
          <span>📅 Programar</span>
        </button>
      </div>
    </div>

    <div id="notificaciones" class="notificaciones"></div>
  </div>

  <!-- Overlay de inicio -->
  <div id="start-overlay" class="start-overlay">
    <div class="overlay-content">
      <div class="overlay-glow"></div>
      <h1 class="overlay-title">🤖 Bienvenida, Niurka</h1>
      <p class="overlay-text">
        Jarvis está listo para ayudarte.<br>
        Haz clic en el botón para activar la voz y comenzar.
      </p>
      <button onclick="iniciarJarvis()" class="overlay-button aero-button large">
        <span class="btn-icon">🎙️</span>
        <span>INICIAR JARVIS</span>
      </button>
      <p class="overlay-hint">(Necesario para activar el micrófono y la voz)</p>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
